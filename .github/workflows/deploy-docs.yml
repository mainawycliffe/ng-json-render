name: Deploy docs

# Builds the demo (docs site) and deploys it to GitHub Pages.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 9.8.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Project Pages are served under /<repo>/, so set the base href to match.
      - run: pnpm exec nx build demo --base-href=/ng-json-render/

      - name: Add SPA fallback and disable Jekyll
        run: |
          cp dist/apps/demo/browser/index.html dist/apps/demo/browser/404.html
          touch dist/apps/demo/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apps/demo/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
